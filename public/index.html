<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EduBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#1e2d45;
  --accent:#4f8ef7;--accent2:#7c5cbf;
  --text:#e8eaf6;--text2:#8892a4;--text3:#4a5568;
  --green:#22c55e;--red:#ef4444;--border:#1e2d45;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;user-select:none}

.page{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);z-index:10;overflow:hidden}
.page.active{transform:translateX(0)}
.page.prev{transform:translateX(-30%)}

.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0d1224;border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.admin-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:none;align-items:center;gap:5px;flex-shrink:0}
.admin-btn.visible{display:flex}

.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.search-wrap{padding:10px 16px;background:#0d1224;border-bottom:1px solid var(--border);flex-shrink:0}
.search-inner{position:relative}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 12px 9px 36px;border-radius:var(--radius-sm);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}

/* Batch grid */
.batch-grid{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.batch-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.2s,transform 0.15s}
.batch-card:active{transform:scale(0.97);border-color:var(--accent)}
.batch-img{width:100%;height:110px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--text3)}
.batch-img img{width:100%;height:100%;object-fit:cover}
.batch-body{padding:10px 12px}
.batch-name{font-size:14px;font-weight:600;line-height:1.3}
.batch-desc{font-size:11px;color:var(--text2);margin-top:3px}
.batch-meta{font-size:11px;color:var(--accent);margin-top:5px;font-weight:500}

/* List rows */
.list{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:13px 14px;gap:12px;cursor:pointer;transition:background 0.15s}
.row:active{background:var(--surface2)}
.row-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.row-info{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;color:var(--text2);margin-top:2px}
.row-arrow{color:var(--text3);font-size:17px;flex-shrink:0}

/* Chapter row */
.chap-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:13px 14px;gap:12px;cursor:pointer;transition:background 0.15s}
.chap-row:active{background:var(--surface2)}
.chap-num{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.chap-info{flex:1;min-width:0}
.chap-name{font-size:14px;font-weight:600}
.chap-sub{font-size:12px;color:var(--text2);margin-top:2px}

/* Unit row */
.unit-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer;transition:background 0.15s}
.unit-row:active{background:var(--surface2)}
.unit-icon{width:34px;height:34px;border-radius:8px;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}

/* Lecture row */
.lec-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer;transition:background 0.15s}
.lec-row:active{background:var(--surface2);border-color:var(--accent)}
.lec-num{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.lec-name{flex:1;font-size:14px;font-weight:500;line-height:1.3}
.lec-play{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lec-play i{font-size:12px;color:#fff;margin-left:2px}

/* Section label */
.sec-label{padding:14px 16px 8px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase}

/* Hero */
.hero{margin:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.hero-img{width:100%;height:140px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3)}
.hero-img img{width:100%;height:100%;object-fit:cover}
.hero-body{padding:14px 16px}
.hero-name{font-size:17px;font-weight:700}
.hero-desc{font-size:13px;color:var(--text2);margin-top:4px}
.hero-meta{display:flex;gap:12px;margin-top:10px}
.hero-stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.hero-stat i{color:var(--accent);font-size:14px}

.loading{text-align:center;padding:50px 20px;color:var(--text2)}
.loading i{font-size:32px;color:var(--accent);display:block;margin-bottom:10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
.empty i{font-size:40px;color:var(--text3);display:block;margin-bottom:10px}

/* Admin Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-close{position:absolute;right:16px;top:16px;background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.modal-title i{color:var(--accent)}
.tabs{display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap}
.tab-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500}
.form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select{appearance:none;cursor:pointer}
.btn-add{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:disabled{opacity:0.5}
.img-preview{width:100%;height:120px;border-radius:var(--radius-sm);background:var(--surface2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin-bottom:8px;position:relative}
.img-preview img{width:100%;height:100%;object-fit:cover}
.img-preview-label{color:var(--text3);font-size:13px;text-align:center}
.manage-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:6px}
.manage-item-icon{font-size:16px;flex-shrink:0}
.manage-item-info{flex:1;min-width:0}
.manage-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.manage-item-sub{font-size:11px;color:var(--text2);margin-top:1px}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:5px;display:flex;align-items:center;font-size:16px}
.del-btn:active{color:var(--red)}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:transform 0.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- PAGE: Home (Batches) -->
<div class="page active" id="page-home">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;flex:1">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,#4f8ef7,#7c5cbf);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px">📚</div>
      <div><div style="font-size:15px;font-weight:700">EduBot</div><div style="font-size:10px;color:var(--text2)">Select Batch</div></div>
    </div>
    <button class="admin-btn" id="adminBtn" onclick="openAdmin()"><i class="ti ti-settings" style="font-size:13px"></i> Admin</button>
  </div>
  <div class="search-wrap">
    <div class="search-inner">
      <i class="ti ti-search search-icon"></i>
      <input class="search-input" id="searchInput" placeholder="Search batches..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="page-body">
    <div class="sec-label">All Batches</div>
    <div class="batch-grid" id="batchGrid"><div class="loading" style="grid-column:1/-1"><i class="ti ti-loader-2"></i>Loading...</div></div>
  </div>
</div>

<!-- PAGE: Subjects -->
<div class="page" id="page-subjects">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0"><div class="topbar-title" id="subjPageTitle"></div><div class="topbar-sub" id="subjPageSub"></div></div>
  </div>
  <div class="page-body">
    <div class="hero" id="batchHero"></div>
    <div class="sec-label">Subjects</div>
    <div class="list" id="subjectList"></div>
  </div>
</div>

<!-- PAGE: Chapters -->
<div class="page" id="page-chapters">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0"><div class="topbar-title" id="chapPageTitle"></div><div class="topbar-sub" id="chapPageSub"></div></div>
  </div>
  <div class="page-body">
    <div class="sec-label">Chapters</div>
    <div class="list" id="chapterList"></div>
  </div>
</div>

<!-- PAGE: Units or Lectures -->
<div class="page" id="page-units">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0"><div class="topbar-title" id="unitPageTitle"></div><div class="topbar-sub" id="unitPageSub"></div></div>
  </div>
  <div class="page-body">
    <div class="sec-label" id="unitSecLabel">Content</div>
    <div class="list" id="unitList"></div>
  </div>
</div>

<!-- PAGE: Lectures (inside unit) -->
<div class="page" id="page-lectures">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0"><div class="topbar-title" id="lecPageTitle"></div><div class="topbar-sub" id="lecPageSub"></div></div>
  </div>
  <div class="page-body">
    <div class="sec-label">Lectures</div>
    <div class="list" id="lectureList"></div>
  </div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeAdmin()"><i class="ti ti-x"></i></button>
    <div class="modal-title"><i class="ti ti-settings"></i>Admin Panel</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('batch')">+ Batch</button>
      <button class="tab-btn" onclick="switchTab('subject')">+ Subject</button>
      <button class="tab-btn" onclick="switchTab('chapter')">+ Chapter</button>
      <button class="tab-btn" onclick="switchTab('unit')">+ Unit</button>
      <button class="tab-btn" onclick="switchTab('lecture')">+ Lecture</button>
      <button class="tab-btn" onclick="switchTab('manage')">Manage</button>
    </div>

    <!-- Add Batch -->
    <div class="tab-content active" id="tab-batch">
      <div class="form-group">
        <label class="form-label">Batch Picture</label>
        <div class="img-preview" id="imgPreview" onclick="document.getElementById('picInput').click()">
          <div class="img-preview-label"><i class="ti ti-camera" style="font-size:24px;display:block;margin-bottom:6px;color:var(--text3)"></i>Tap to select image</div>
        </div>
        <input type="file" id="picInput" accept="image/*" style="display:none" onchange="handlePic(this)">
      </div>
      <div class="form-group"><label class="form-label">Batch Name</label><input class="form-input" id="bName" placeholder="e.g. JEE 2025 Batch"></div>
      <div class="form-group"><label class="form-label">Description (optional)</label><input class="form-input" id="bDesc" placeholder="e.g. Complete preparation batch"></div>
      <button class="btn-add" id="btnBatch" onclick="addBatch()"><i class="ti ti-plus"></i> Add Batch</button>
    </div>

    <!-- Add Subject -->
    <div class="tab-content" id="tab-subject">
      <div class="form-group"><label class="form-label">Batch</label><select class="form-select" id="sBatch"></select></div>
      <div class="form-group"><label class="form-label">Subject Name</label><input class="form-input" id="sName" placeholder="e.g. Mathematics"></div>
      <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="sIcon" placeholder="📐" maxlength="4" style="font-size:20px"></div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <select class="form-select" id="sColor">
          <option value="#4f8ef7">🔵 Blue</option><option value="#7c5cbf">🟣 Purple</option>
          <option value="#22c55e">🟢 Green</option><option value="#f5a623">🟠 Orange</option>
          <option value="#ef4444">🔴 Red</option><option value="#06b6d4">🩵 Cyan</option><option value="#ec4899">🩷 Pink</option>
        </select>
      </div>
      <button class="btn-add" id="btnSubject" onclick="addSubject()"><i class="ti ti-plus"></i> Add Subject</button>
    </div>

    <!-- Add Chapter -->
    <div class="tab-content" id="tab-chapter">
      <div class="form-group"><label class="form-label">Batch</label><select class="form-select" id="cBatch" onchange="updateSubjectSelect()"></select></div>
      <div class="form-group"><label class="form-label">Subject</label><select class="form-select" id="cSubject"></select></div>
      <div class="form-group"><label class="form-label">Chapter Name</label><input class="form-input" id="cName" placeholder="e.g. Chapter 1 - Algebra"></div>
      <button class="btn-add" id="btnChapter" onclick="addChapter()"><i class="ti ti-plus"></i> Add Chapter</button>
    </div>

    <!-- Add Unit (optional) -->
    <div class="tab-content" id="tab-unit">
      <div class="form-group"><label class="form-label">Batch</label><select class="form-select" id="uBatch" onchange="updateUSubjectSelect()"></select></div>
      <div class="form-group"><label class="form-label">Subject</label><select class="form-select" id="uSubject" onchange="updateUChapterSelect()"></select></div>
      <div class="form-group"><label class="form-label">Chapter</label><select class="form-select" id="uChapter"></select></div>
      <div class="form-group"><label class="form-label">Unit Name</label><input class="form-input" id="uName" placeholder="e.g. Unit 1 - Basics"></div>
      <button class="btn-add" id="btnUnit" onclick="addUnit()"><i class="ti ti-plus"></i> Add Unit</button>
    </div>

    <!-- Add Lecture -->
    <div class="tab-content" id="tab-lecture">
      <div class="form-group"><label class="form-label">Batch</label><select class="form-select" id="lBatch" onchange="updateLSubjectSelect()"></select></div>
      <div class="form-group"><label class="form-label">Subject</label><select class="form-select" id="lSubject" onchange="updateLChapterSelect()"></select></div>
      <div class="form-group"><label class="form-label">Chapter</label><select class="form-select" id="lChapter" onchange="updateLUnitSelect()"></select></div>
      <div class="form-group"><label class="form-label">Unit (optional — agar unit nahi hai to empty rakho)</label><select class="form-select" id="lUnit"></select></div>
      <div class="form-group"><label class="form-label">Lecture Name</label><input class="form-input" id="lName" placeholder="e.g. Introduction to Limits"></div>
      <div class="form-group"><label class="form-label">Bot Link</label><input class="form-input" id="lLink" placeholder="https://t.me/YourBot?start=CODE"></div>
      <button class="btn-add" id="btnLecture" onclick="addLecture()"><i class="ti ti-plus"></i> Add Lecture</button>
    </div>

    <!-- Manage -->
    <div class="tab-content" id="tab-manage"><div id="manageList"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

var batches = [];
var isAdmin = false;
var pageStack = ['home'];
var picBase64 = '';

// ── Nav ───────────────────────────────────────────────────────────────────────
function goTo(pageId) {
  var cur = pageStack[pageStack.length-1];
  document.getElementById('page-'+cur).classList.remove('active');
  document.getElementById('page-'+cur).classList.add('prev');
  document.getElementById('page-'+pageId).classList.add('active');
  document.getElementById('page-'+pageId).classList.remove('prev');
  pageStack.push(pageId);
  if (tg) tg.BackButton.show();
}
function goBack() {
  if (pageStack.length <= 1) return;
  var cur = pageStack.pop();
  var prev = pageStack[pageStack.length-1];
  var curEl = document.getElementById('page-'+cur);
  curEl.classList.remove('active','prev');
  curEl.style.transform = '';
  document.getElementById('page-'+prev).classList.add('active');
  document.getElementById('page-'+prev).classList.remove('prev');
  if (pageStack.length <= 1 && tg) tg.BackButton.hide();
}
if (tg) tg.BackButton.onClick(goBack);

// ── Open Batch ────────────────────────────────────────────────────────────────
function openBatch(bid) {
  var b = batches.find(x => x._id === bid);
  if (!b) return;
  document.getElementById('subjPageTitle').textContent = b.name;
  document.getElementById('subjPageSub').textContent = b.subjects.length + ' subjects';
  document.getElementById('batchHero').innerHTML = `
    <div class="hero-img">${b.pic ? `<img src="${b.pic}">` : '🎓'}</div>
    <div class="hero-body">
      <div class="hero-name">${b.name}</div>
      ${b.description ? `<div class="hero-desc">${b.description}</div>` : ''}
      <div class="hero-meta">
        <span class="hero-stat"><i class="ti ti-books"></i>${b.subjects.length} subjects</span>
        <span class="hero-stat"><i class="ti ti-layers"></i>${b.subjects.reduce((a,s)=>a+s.chapters.length,0)} chapters</span>
      </div>
    </div>`;
  var list = document.getElementById('subjectList');
  list.innerHTML = !b.subjects.length ? '<div class="empty"><i class="ti ti-books"></i>No subjects yet</div>' :
    b.subjects.map(s => `
      <div class="row" onclick="openSubject('${bid}','${s._id}')">
        <div class="row-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
        <div class="row-info">
          <div class="row-name">${s.name}</div>
          <div class="row-sub">${s.chapters.length} chapters</div>
        </div>
        <i class="ti ti-chevron-right row-arrow"></i>
      </div>`).join('');
  goTo('subjects');
}

// ── Open Subject ──────────────────────────────────────────────────────────────
function openSubject(bid, sid) {
  var b = batches.find(x => x._id === bid);
  var s = b && b.subjects.find(x => x._id === sid);
  if (!s) return;
  document.getElementById('chapPageTitle').textContent = s.name;
  document.getElementById('chapPageSub').textContent = s.chapters.length + ' chapters';
  var list = document.getElementById('chapterList');
  list.innerHTML = !s.chapters.length ? '<div class="empty"><i class="ti ti-layers"></i>No chapters yet</div>' :
    s.chapters.map((c,i) => `
      <div class="chap-row" onclick="openChapter('${bid}','${sid}','${c._id}')">
        <div class="chap-num" style="background:${s.color}">${i+1}</div>
        <div class="chap-info">
          <div class="chap-name">${c.name}</div>
          <div class="chap-sub">${c.units.length ? c.units.length+' units' : c.lectures.length+' lectures'}</div>
        </div>
        <i class="ti ti-chevron-right row-arrow"></i>
      </div>`).join('');
  goTo('chapters');
}

// ── Open Chapter ──────────────────────────────────────────────────────────────
function openChapter(bid, sid, cid) {
  var b = batches.find(x => x._id === bid);
  var s = b && b.subjects.find(x => x._id === sid);
  var c = s && s.chapters.find(x => x._id === cid);
  if (!c) return;
  var color = s.color;
  document.getElementById('unitPageTitle').textContent = c.name;

  if (c.units && c.units.length > 0) {
    // Units hain — units dikhao
    document.getElementById('unitPageSub').textContent = c.units.length + ' units';
    document.getElementById('unitSecLabel').textContent = 'UNITS';
    document.getElementById('unitList').innerHTML = c.units.map((u,i) => `
      <div class="unit-row" onclick="openUnit('${bid}','${sid}','${cid}','${u._id}')">
        <div class="unit-icon"><i class="ti ti-folder" style="color:#fff;font-size:16px"></i></div>
        <div class="row-info">
          <div class="row-name">${u.name}</div>
          <div class="row-sub">${u.lectures.length} lectures</div>
        </div>
        <i class="ti ti-chevron-right row-arrow"></i>
      </div>`).join('');
  } else {
    // Units nahi — seedhe lectures
    document.getElementById('unitPageSub').textContent = c.lectures.length + ' lectures';
    document.getElementById('unitSecLabel').textContent = 'LECTURES';
    document.getElementById('unitList').innerHTML = !c.lectures.length ? '<div class="empty"><i class="ti ti-video"></i>No lectures yet</div>' :
      c.lectures.map((l,i) => `
        <div class="lec-row" onclick="openLink('${l.link}')">
          <div class="lec-num">${i+1}</div>
          <div class="lec-name">${l.name}</div>
          <div class="lec-play"><i class="ti ti-player-play"></i></div>
        </div>`).join('');
  }
  goTo('units');
}

// ── Open Unit ─────────────────────────────────────────────────────────────────
function openUnit(bid, sid, cid, uid) {
  var b = batches.find(x => x._id === bid);
  var s = b && b.subjects.find(x => x._id === sid);
  var c = s && s.chapters.find(x => x._id === cid);
  var u = c && c.units.find(x => x._id === uid);
  if (!u) return;
  document.getElementById('lecPageTitle').textContent = u.name;
  document.getElementById('lecPageSub').textContent = u.lectures.length + ' lectures';
  document.getElementById('lectureList').innerHTML = !u.lectures.length ? '<div class="empty"><i class="ti ti-video"></i>No lectures yet</div>' :
    u.lectures.map((l,i) => `
      <div class="lec-row" onclick="openLink('${l.link}')">
        <div class="lec-num">${i+1}</div>
        <div class="lec-name">${l.name}</div>
        <div class="lec-play"><i class="ti ti-player-play"></i></div>
      </div>`).join('');
  goTo('lectures');
}

function openLink(url) {
  if (tg) tg.openTelegramLink(url);
  else window.open(url, '_blank');
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    batches = await (await fetch('/api/batches')).json();
    renderBatches(batches);
  } catch(e) {
    document.getElementById('batchGrid').innerHTML = '<div class="empty" style="grid-column:1/-1"><i class="ti ti-wifi-off"></i>Load failed</div>';
  }
}

function renderBatches(list) {
  var el = document.getElementById('batchGrid');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty" style="grid-column:1/-1"><i class="ti ti-school"></i>No batches yet</div>';
    return;
  }
  el.innerHTML = list.map(b => `
    <div class="batch-card" onclick="openBatch('${b._id}')">
      <div class="batch-img">${b.pic ? `<img src="${b.pic}">` : '🎓'}</div>
      <div class="batch-body">
        <div class="batch-name">${b.name}</div>
        ${b.description ? `<div class="batch-desc">${b.description}</div>` : ''}
        <div class="batch-meta">${b.subjects.length} subjects</div>
      </div>
    </div>`).join('');
}

function handleSearch(q) {
  q = q.toLowerCase().trim();
  renderBatches(!q ? batches : batches.filter(b => b.name.toLowerCase().includes(q)));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show'+(type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── Pic ───────────────────────────────────────────────────────────────────────
function handlePic(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    picBase64 = e.target.result;
    document.getElementById('imgPreview').innerHTML = `<img src="${picBase64}">`;
  };
  reader.readAsDataURL(file);
}

// ── Admin ─────────────────────────────────────────────────────────────────────
async function checkAdminAccess() {
  try {
    var config = await (await fetch('/api/config')).json();
    var owner = config.ownerUsername.toLowerCase();
    if (!owner) return;
    var tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
    var cur = tgUser ? (tgUser.username||'').toLowerCase() : '';
    if (cur && cur === owner) { isAdmin = true; document.getElementById('adminBtn').classList.add('visible'); }
  } catch(e) {}
}

async function apiFetch(url, method, body) {
  var opts = { method: method||'GET', headers: {'Content-Type':'application/json','x-tg-init-data': tg?tg.initData:''} };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function openAdmin(tab) {
  if (!isAdmin) return;
  document.getElementById('adminModal').classList.add('show');
  populateAllSelects();
  switchTab(tab||'batch');
}
function closeAdmin() { document.getElementById('adminModal').classList.remove('show'); }
function closeModalOutside(e) { if (e.target.id==='adminModal') closeAdmin(); }

function switchTab(name) {
  var tabs = ['batch','subject','chapter','unit','lecture','manage'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='manage') renderManage();
}

function batchOpts() { return batches.map(b=>`<option value="${b._id}">${b.name}</option>`).join('')||'<option>Pehle batch add karo</option>'; }

function subjectOpts(bid) {
  var b = batches.find(x=>x._id===bid);
  return b ? b.subjects.map(s=>`<option value="${s._id}">${s.icon} ${s.name}</option>`).join('')||'<option>Pehle subject add karo</option>' : '<option>Batch select karo</option>';
}

function chapterOpts(bid, sid) {
  var b = batches.find(x=>x._id===bid);
  var s = b && b.subjects.find(x=>x._id===sid);
  return s ? s.chapters.map(c=>`<option value="${c._id}">${c.name}</option>`).join('')||'<option>Pehle chapter add karo</option>' : '<option>Subject select karo</option>';
}

function unitOpts(bid, sid, cid) {
  var b = batches.find(x=>x._id===bid);
  var s = b && b.subjects.find(x=>x._id===sid);
  var c = s && s.chapters.find(x=>x._id===cid);
  var base = '<option value="">-- Direct chapter mein (no unit) --</option>';
  return c && c.units.length ? base + c.units.map(u=>`<option value="${u._id}">${u.name}</option>`).join('') : base;
}

function populateAllSelects() {
  var bo = batchOpts();
  ['sBatch','cBatch','uBatch','lBatch'].forEach(id=>{ var el=document.getElementById(id); if(el) el.innerHTML=bo; });
  updateSubjectSelect(); updateUSubjectSelect(); updateLSubjectSelect();
}

function updateSubjectSelect() { document.getElementById('cSubject').innerHTML = subjectOpts(document.getElementById('cBatch').value); }
function updateUSubjectSelect() { document.getElementById('uSubject').innerHTML = subjectOpts(document.getElementById('uBatch').value); updateUChapterSelect(); }
function updateUChapterSelect() { document.getElementById('uChapter').innerHTML = chapterOpts(document.getElementById('uBatch').value, document.getElementById('uSubject').value); }
function updateLSubjectSelect() { document.getElementById('lSubject').innerHTML = subjectOpts(document.getElementById('lBatch').value); updateLChapterSelect(); }
function updateLChapterSelect() { document.getElementById('lChapter').innerHTML = chapterOpts(document.getElementById('lBatch').value, document.getElementById('lSubject').value); updateLUnitSelect(); }
function updateLUnitSelect() { document.getElementById('lUnit').innerHTML = unitOpts(document.getElementById('lBatch').value, document.getElementById('lSubject').value, document.getElementById('lChapter').value); }

function setLoading(id, on, label) {
  var b = document.getElementById(id);
  b.disabled = on;
  b.innerHTML = on ? '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i> Adding...' : label;
}

async function addBatch() {
  var name = document.getElementById('bName').value.trim();
  var desc = document.getElementById('bDesc').value.trim();
  if (!name) return toast('Batch name daalo!','error');
  setLoading('btnBatch',true);
  try {
    var newBatch = await apiFetch('/api/batches','POST',{name, description:desc, pic:picBase64});
    batches.push(newBatch);
    renderBatches(batches); populateAllSelects();
    document.getElementById('bName').value=''; document.getElementById('bDesc').value='';
    document.getElementById('imgPreview').innerHTML='<div class="img-preview-label"><i class="ti ti-camera" style="font-size:24px;display:block;margin-bottom:6px;color:var(--text3)"></i>Tap to select image</div>';
    picBase64='';
    toast('Batch add ho gaya!','success');
  } catch(e){toast('Error: '+e.message,'error');}
  setLoading('btnBatch',false,'<i class="ti ti-plus"></i> Add Batch');
}

async function addSubject() {
  var bid=document.getElementById('sBatch').value, name=document.getElementById('sName').value.trim(), icon=document.getElementById('sIcon').value.trim()||'📚', color=document.getElementById('sColor').value;
  if(!bid||!name) return toast('Sab fields bharein!','error');
  setLoading('btnSubject',true);
  try {
    var updated = await apiFetch(`/api/batches/${bid}/subjects`,'POST',{name,icon,color});
    var idx = batches.findIndex(x=>x._id===bid); if(idx>=0) batches[idx]=updated;
    renderBatches(batches); populateAllSelects();
    document.getElementById('sName').value=''; toast('Subject add ho gaya!','success');
  } catch(e){toast('Error: '+e.message,'error');}
  setLoading('btnSubject',false,'<i class="ti ti-plus"></i> Add Subject');
}

async function addChapter() {
  var bid=document.getElementById('cBatch').value, sid=document.getElementById('cSubject').value, name=document.getElementById('cName').value.trim();
  if(!bid||!sid||!name) return toast('Sab fields bharein!','error');
  setLoading('btnChapter',true);
  try {
    var updated = await apiFetch(`/api/batches/${bid}/subjects/${sid}/chapters`,'POST',{name});
    var idx = batches.findIndex(x=>x._id===bid); if(idx>=0) batches[idx]=updated;
    populateAllSelects();
    document.getElementById('cName').value=''; toast('Chapter add ho gaya!','success');
  } catch(e){toast('Error: '+e.message,'error');}
  setLoading('btnChapter',false,'<i class="ti ti-plus"></i> Add Chapter');
}

async function addUnit() {
  var bid=document.getElementById('uBatch').value, sid=document.getElementById('uSubject').value, cid=document.getElementById('uChapter').value, name=document.getElementById('uName').value.trim();
  if(!bid||!sid||!cid||!name) return toast('Sab fields bharein!','error');
  setLoading('btnUnit',true);
  try {
    var updated = await apiFetch(`/api/batches/${bid}/subjects/${sid}/chapters/${cid}/units`,'POST',{name});
    var idx = batches.findIndex(x=>x._id===bid); if(idx>=0) batches[idx]=updated;
    populateAllSelects();
    document.getElementById('uName').value=''; toast('Unit add ho gaya!','success');
  } catch(e){toast('Error: '+e.message,'error');}
  setLoading('btnUnit',false,'<i class="ti ti-plus"></i> Add Unit');
}

async function addLecture() {
  var bid=document.getElementById('lBatch').value, sid=document.getElementById('lSubject').value, cid=document.getElementById('lChapter').value, uid=document.getElementById('lUnit').value, name=document.getElementById('lName').value.trim(), link=document.getElementById('lLink').value.trim();
  if(!bid||!sid||!cid||!name||!link) return toast('Sab fields bharein!','error');
  setLoading('btnLecture',true);
  try {
    var url = uid ? `/api/batches/${bid}/subjects/${sid}/chapters/${cid}/units/${uid}/lectures` : `/api/batches/${bid}/subjects/${sid}/chapters/${cid}/lectures`;
    var updated = await apiFetch(url,'POST',{name,link});
    var idx = batches.findIndex(x=>x._id===bid); if(idx>=0) batches[idx]=updated;
    populateAllSelects();
    document.getElementById('lName').value=''; document.getElementById('lLink').value='';
    toast('Lecture add ho gaya!','success');
  } catch(e){toast('Error: '+e.message,'error');}
  setLoading('btnLecture',false,'<i class="ti ti-plus"></i> Add Lecture');
}

function renderManage() {
  var html='';
  batches.forEach(b=>{
    html+=`<div class="manage-item"><span class="manage-item-icon">🎓</span><div class="manage-item-info"><div class="manage-item-name">${b.name}</div><div class="manage-item-sub">${b.subjects.length} subjects</div></div><button class="del-btn" onclick="delBatch('${b._id}')"><i class="ti ti-trash"></i></button></div>`;
    b.subjects.forEach(s=>{
      html+=`<div class="manage-item" style="padding-left:24px"><span class="manage-item-icon">${s.icon}</span><div class="manage-item-info"><div class="manage-item-name">${s.name}</div><div class="manage-item-sub">${b.name} · ${s.chapters.length} ch</div></div><button class="del-btn" onclick="delSubject('${b._id}','${s._id}')"><i class="ti ti-trash"></i></button></div>`;
      s.chapters.forEach(c=>{
        html+=`<div class="manage-item" style="padding-left:40px"><span class="manage-item-icon" style="font-size:13px">📂</span><div class="manage-item-info"><div class="manage-item-name">${c.name}</div><div class="manage-item-sub">${s.name}</div></div><button class="del-btn" onclick="delChapter('${b._id}','${s._id}','${c._id}')"><i class="ti ti-trash"></i></button></div>`;
        c.units.forEach(u=>{
          html+=`<div class="manage-item" style="padding-left:56px"><span class="manage-item-icon" style="font-size:12px">📁</span><div class="manage-item-info"><div class="manage-item-name">${u.name}</div><div class="manage-item-sub">${c.name} · ${u.lectures.length} lec</div></div><button class="del-btn" onclick="delUnit('${b._id}','${s._id}','${c._id}','${u._id}')"><i class="ti ti-trash"></i></button></div>`;
        });
        c.lectures.forEach(l=>{
          html+=`<div class="manage-item" style="padding-left:56px"><span class="manage-item-icon" style="font-size:12px">▶</span><div class="manage-item-info"><div class="manage-item-name">${l.name}</div><div class="manage-item-sub">${c.name}</div></div><button class="del-btn" onclick="delLecture('${b._id}','${s._id}','${c._id}',null,'${l._id}')"><i class="ti ti-trash"></i></button></div>`;
        });
      });
    });
  });
  document.getElementById('manageList').innerHTML = html||'<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px">Kuch nahi hai</div>';
}

async function delBatch(bid){if(!confirm('Batch delete?'))return;try{await apiFetch(`/api/batches/${bid}`,'DELETE');batches=batches.filter(x=>x._id!==bid);renderBatches(batches);populateAllSelects();renderManage();toast('Deleted!','success');}catch(e){toast('Error','error');}}
async function delSubject(bid,sid){if(!confirm('Subject delete?'))return;try{await apiFetch(`/api/batches/${bid}/subjects/${sid}`,'DELETE');var b=batches.find(x=>x._id===bid);if(b)b.subjects=b.subjects.filter(x=>x._id!==sid);populateAllSelects();renderManage();toast('Deleted!','success');}catch(e){toast('Error','error');}}
async function delChapter(bid,sid,cid){if(!confirm('Chapter delete?'))return;try{await apiFetch(`/api/batches/${bid}/subjects/${sid}/chapters/${cid}`,'DELETE');var b=batches.find(x=>x._id===bid);var s=b&&b.subjects.find(x=>x._id===sid);if(s)s.chapters=s.chapters.filter(x=>x._id!==cid);populateAllSelects();renderManage();toast('Deleted!','success');}catch(e){toast('Error','error');}}
async function delUnit(bid,sid,cid,uid){if(!confirm('Unit delete?'))return;try{await apiFetch(`/api/batches/${bid}/subjects/${sid}/chapters/${cid}/units/${uid}`,'DELETE');var b=batches.find(x=>x._id===bid);var s=b&&b.subjects.find(x=>x._id===sid);var c=s&&s.chapters.find(x=>x._id===cid);if(c)c.units=c.units.filter(x=>x._id!==uid);populateAllSelects();renderManage();toast('Deleted!','success');}catch(e){toast('Error','error');}}
async function delLecture(bid,sid,cid,uid,lid){if(!confirm('Lecture delete?'))return;try{
  var url = uid ? `/api/batches/${bid}/subjects/${sid}/chapters/${cid}/units/${uid}/lectures/${lid}` : `/api/batches/${bid}/subjects/${sid}/chapters/${cid}/lectures/${lid}`;
  await apiFetch(url,'DELETE');
  var b=batches.find(x=>x._id===bid);var s=b&&b.subjects.find(x=>x._id===sid);var c=s&&s.chapters.find(x=>x._id===cid);
  if(uid){var u=c&&c.units.find(x=>x._id===uid);if(u)u.lectures=u.lectures.filter(x=>x._id!==lid);}
  else{if(c)c.lectures=c.lectures.filter(x=>x._id!==lid);}
  populateAllSelects();renderManage();toast('Deleted!','success');}catch(e){toast('Error','error');}}

checkAdminAccess();
load();
</script>
</body>
</html>
