<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EduBot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--surface3:#1e2d45;
  --accent:#4f8ef7;--accent2:#7c5cbf;
  --text:#e8eaf6;--text2:#8892a4;--text3:#4a5568;
  --green:#22c55e;--red:#ef4444;--border:#1e2d45;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;user-select:none}

/* ── Page System ── */
.page{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);z-index:10;overflow:hidden}
.page.active{transform:translateX(0)}
.page.prev{transform:translateX(-30%)}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#0d1224;border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.topbar-title{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:2px}
.admin-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:none;align-items:center;gap:5px}
.admin-btn.visible{display:flex}

/* ── Scroll area ── */
.page-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Home search ── */
.search-wrap{padding:12px 16px;background:#0d1224;border-bottom:1px solid var(--border);flex-shrink:0}
.search-inner{position:relative}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px 10px 38px;border-radius:var(--radius-sm);font-size:14px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}

/* ── Stats ── */
.stats{display:flex;padding:14px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;text-align:center;padding:0 8px}
.stat+.stat{border-left:1px solid var(--border)}
.stat-num{font-size:20px;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px}

/* ── Section label ── */
.section-label{padding:14px 16px 8px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:1.2px;text-transform:uppercase}

/* ── Subject cards (home) ── */
.subject-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:10px}
.subject-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:14px 16px;gap:14px;cursor:pointer;transition:border-color 0.2s,background 0.15s}
.subject-card:active{background:var(--surface2)}
.subj-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.subj-info{flex:1;min-width:0}
.subj-name{font-size:15px;font-weight:600}
.subj-meta{font-size:12px;color:var(--text2);margin-top:3px}
.subj-arrow{color:var(--text3);font-size:18px;flex-shrink:0}

/* ── Chapter list ── */
.chapter-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.chapter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background 0.15s}
.chapter-card:active{background:var(--surface2)}
.chap-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.chap-info{flex:1;min-width:0}
.chap-name{font-size:14px;font-weight:600}
.chap-count{font-size:12px;color:var(--text2);margin-top:3px}
.chap-arrow{color:var(--text3);font-size:18px;flex-shrink:0}

/* ── Lecture list ── */
.lecture-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.lecture-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:14px 16px;gap:12px;cursor:pointer;transition:background 0.15s}
.lecture-card:active{background:var(--surface2);border-color:var(--accent)}
.lec-num{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.lec-info{flex:1;min-width:0}
.lec-name{font-size:14px;font-weight:500;line-height:1.3}
.lec-play{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lec-play i{font-size:13px;color:#fff;margin-left:2px}

/* ── Subject header card ── */
.page-hero{margin:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px}
.hero-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hero-name{font-size:18px;font-weight:700}
.hero-meta{font-size:13px;color:var(--text2);margin-top:4px}

/* ── Loading / Empty ── */
.loading{text-align:center;padding:50px 20px;color:var(--text2)}
.loading i{font-size:32px;color:var(--accent);display:block;margin-bottom:10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--text2);font-size:14px}
.empty i{font-size:44px;color:var(--text3);display:block;margin-bottom:12px}

/* ── Admin Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;position:relative}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.modal-close{position:absolute;right:16px;top:16px;background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal-title i{color:var(--accent)}
.tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto}
.tab-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-content{display:none}.tab-content.active{display:block}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 12px;border-radius:var(--radius-sm);font-size:14px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--accent)}
.form-select{appearance:none;cursor:pointer}
.btn-add{width:100%;background:var(--accent);color:#fff;border:none;padding:13px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:disabled{opacity:0.5}
.manage-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:7px}
.manage-item-icon{font-size:18px;flex-shrink:0}
.manage-item-info{flex:1;min-width:0}
.manage-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.manage-item-sub{font-size:11px;color:var(--text2);margin-top:2px}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;display:flex;align-items:center;font-size:17px}
.del-btn:hover{color:var(--red)}

/* ── Toast ── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;transition:transform 0.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- ══ PAGE 1: Home ══ -->
<div class="page active" id="page-home">
  <div class="topbar">
    <div class="logo" style="display:flex;align-items:center;gap:10px;flex:1">
      <div style="width:34px;height:34px;background:linear-gradient(135deg,#4f8ef7,#7c5cbf);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px">📚</div>
      <div>
        <div style="font-size:15px;font-weight:700">EduBot</div>
        <div style="font-size:10px;color:var(--text2)">Video Lectures</div>
      </div>
    </div>
    <button class="admin-btn" id="adminBtn" onclick="openAdmin()">
      <i class="ti ti-settings" style="font-size:13px"></i> Admin
    </button>
  </div>
  <div class="search-wrap">
    <div class="search-inner">
      <i class="ti ti-search search-icon"></i>
      <input class="search-input" id="searchInput" placeholder="Search subjects..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="stats" id="statsBar">
    <div class="stat"><div class="stat-num">—</div><div class="stat-label">Subjects</div></div>
    <div class="stat"><div class="stat-num">—</div><div class="stat-label">Chapters</div></div>
    <div class="stat"><div class="stat-num">—</div><div class="stat-label">Lectures</div></div>
  </div>
  <div class="page-body">
    <div class="section-label">All Subjects</div>
    <div class="subject-list" id="subjectList">
      <div class="loading"><i class="ti ti-loader-2"></i>Loading...</div>
    </div>
  </div>
</div>

<!-- ══ PAGE 2: Chapters ══ -->
<div class="page" id="page-chapters">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0">
      <div class="topbar-title" id="chapPageTitle">Chapters</div>
      <div class="topbar-sub" id="chapPageSub"></div>
    </div>
  </div>
  <div class="page-body">
    <div class="page-hero" id="chapHero"></div>
    <div class="section-label">Chapters</div>
    <div class="chapter-list" id="chapterList"></div>
  </div>
</div>

<!-- ══ PAGE 3: Lectures ══ -->
<div class="page" id="page-lectures">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
    <div style="flex:1;min-width:0">
      <div class="topbar-title" id="lecPageTitle">Lectures</div>
      <div class="topbar-sub" id="lecPageSub"></div>
    </div>
  </div>
  <div class="page-body">
    <div class="section-label">Lectures</div>
    <div class="lecture-list" id="lectureList"></div>
  </div>
</div>

<!-- ══ Admin Modal ══ -->
<div class="modal-overlay" id="adminModal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeAdmin()"><i class="ti ti-x"></i></button>
    <div class="modal-title"><i class="ti ti-settings"></i>Admin Panel</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add-subject')">+ Subject</button>
      <button class="tab-btn" onclick="switchTab('add-chapter')">+ Chapter</button>
      <button class="tab-btn" onclick="switchTab('add-lecture')">+ Lecture</button>
      <button class="tab-btn" onclick="switchTab('manage')">Manage</button>
    </div>
    <div class="tab-content active" id="tab-add-subject">
      <div class="form-group"><label class="form-label">Subject Name</label><input class="form-input" id="sName" placeholder="e.g. Mathematics"></div>
      <div class="form-group"><label class="form-label">Icon (emoji)</label><input class="form-input" id="sIcon" placeholder="📐" maxlength="4" style="font-size:20px"></div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <select class="form-select" id="sColor">
          <option value="#4f8ef7">🔵 Blue</option><option value="#7c5cbf">🟣 Purple</option>
          <option value="#22c55e">🟢 Green</option><option value="#f5a623">🟠 Orange</option>
          <option value="#ef4444">🔴 Red</option><option value="#06b6d4">🩵 Cyan</option><option value="#ec4899">🩷 Pink</option>
        </select>
      </div>
      <button class="btn-add" id="btnAddSubject" onclick="addSubject()"><i class="ti ti-plus"></i> Add Subject</button>
    </div>
    <div class="tab-content" id="tab-add-chapter">
      <div class="form-group"><label class="form-label">Subject</label><select class="form-select" id="cSubject"></select></div>
      <div class="form-group"><label class="form-label">Chapter Name</label><input class="form-input" id="cName" placeholder="e.g. Chapter 1 - Algebra"></div>
      <button class="btn-add" id="btnAddChapter" onclick="addChapter()"><i class="ti ti-plus"></i> Add Chapter</button>
    </div>
    <div class="tab-content" id="tab-add-lecture">
      <div class="form-group"><label class="form-label">Subject</label><select class="form-select" id="lSubject" onchange="updateLecChapters()"></select></div>
      <div class="form-group"><label class="form-label">Chapter</label><select class="form-select" id="lChapter"></select></div>
      <div class="form-group"><label class="form-label">Lecture Name</label><input class="form-input" id="lName" placeholder="e.g. Introduction to Limits"></div>
      <div class="form-group"><label class="form-label">Bot Link</label><input class="form-input" id="lLink" placeholder="https://t.me/YourBot?start=CODE"></div>
      <button class="btn-add" id="btnAddLecture" onclick="addLecture()"><i class="ti ti-plus"></i> Add Lecture</button>
    </div>
    <div class="tab-content" id="tab-manage"><div id="manageList"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

var subjects = [];
var isAdmin = false;
var pageStack = ['home'];

// ── Navigation ────────────────────────────────────────────────────────────────
function goTo(pageId) {
  var current = pageStack[pageStack.length - 1];
  document.getElementById('page-' + current).classList.remove('active');
  document.getElementById('page-' + current).classList.add('prev');
  document.getElementById('page-' + pageId).classList.add('active');
  document.getElementById('page-' + pageId).classList.remove('prev');
  pageStack.push(pageId);
  if (tg) tg.BackButton.show();
}

function goBack() {
  if (pageStack.length <= 1) return;
  var current = pageStack.pop();
  var prev = pageStack[pageStack.length - 1];
  document.getElementById('page-' + current).classList.remove('active');
  document.getElementById('page-' + current).classList.remove('prev');
  document.getElementById('page-' + current).style.transform = '';
  document.getElementById('page-' + prev).classList.add('active');
  document.getElementById('page-' + prev).classList.remove('prev');
  if (pageStack.length <= 1 && tg) tg.BackButton.hide();
}

if (tg) tg.BackButton.onClick(goBack);

// ── Open Subject (go to chapters page) ───────────────────────────────────────
function openSubject(sid) {
  var subj = subjects.find(s => s._id === sid);
  if (!subj) return;

  document.getElementById('chapPageTitle').textContent = subj.name;
  document.getElementById('chapPageSub').textContent = subj.chapters.length + ' chapters';

  document.getElementById('chapHero').innerHTML = `
    <div class="hero-icon" style="background:${subj.color}22;border:1px solid ${subj.color}44">${subj.icon}</div>
    <div>
      <div class="hero-name">${subj.name}</div>
      <div class="hero-meta">${subj.chapters.length} chapters &middot; ${subj.chapters.reduce((a,c)=>a+c.lectures.length,0)} lectures</div>
    </div>`;

  var list = document.getElementById('chapterList');
  if (!subj.chapters.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-books"></i>No chapters yet</div>';
  } else {
    list.innerHTML = subj.chapters.map((c, i) => `
      <div class="chapter-card" onclick="openChapter('${subj._id}','${c._id}')">
        <div class="chap-num" style="background:${subj.color}">${i+1}</div>
        <div class="chap-info">
          <div class="chap-name">${c.name}</div>
          <div class="chap-count">${c.lectures.length} lectures</div>
        </div>
        <i class="ti ti-chevron-right chap-arrow"></i>
      </div>`).join('');
  }
  goTo('chapters');
}

// ── Open Chapter (go to lectures page) ───────────────────────────────────────
function openChapter(sid, cid) {
  var subj = subjects.find(s => s._id === sid);
  if (!subj) return;
  var chap = subj.chapters.find(c => c._id === cid);
  if (!chap) return;

  document.getElementById('lecPageTitle').textContent = chap.name;
  document.getElementById('lecPageSub').textContent = subj.name + ' · ' + chap.lectures.length + ' lectures';

  var list = document.getElementById('lectureList');
  if (!chap.lectures.length) {
    list.innerHTML = '<div class="empty"><i class="ti ti-video"></i>No lectures yet</div>';
  } else {
    list.innerHTML = chap.lectures.map((l, i) => `
      <div class="lecture-card" onclick="openLink('${l.link}')">
        <div class="lec-num">${i+1}</div>
        <div class="lec-info">
          <div class="lec-name">${l.name}</div>
        </div>
        <div class="lec-play"><i class="ti ti-player-play"></i></div>
      </div>`).join('');
  }
  goTo('lectures');
}

function openLink(url) {
  if (tg) tg.openTelegramLink(url);
  else window.open(url, '_blank');
}

// ── Load Data ─────────────────────────────────────────────────────────────────
async function loadSubjects() {
  try {
    subjects = await (await fetch('/api/subjects')).json();
    renderStats();
    renderSubjects(subjects);
  } catch(e) {
    document.getElementById('subjectList').innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>Load failed. Refresh karo.</div>';
  }
}

function renderStats() {
  var chaps = subjects.reduce((a,s)=>a+s.chapters.length,0);
  var lecs = subjects.reduce((a,s)=>s.chapters.reduce((b,c)=>b+c.lectures.length,a),0);
  document.getElementById('statsBar').innerHTML =
    `<div class="stat"><div class="stat-num">${subjects.length}</div><div class="stat-label">Subjects</div></div>
     <div class="stat"><div class="stat-num">${chaps}</div><div class="stat-label">Chapters</div></div>
     <div class="stat"><div class="stat-num">${lecs}</div><div class="stat-label">Lectures</div></div>`;
}

function renderSubjects(list) {
  var el = document.getElementById('subjectList');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-books"></i>Koi subject nahi hai</div>';
    return;
  }
  el.innerHTML = list.map(s => `
    <div class="subject-card" onclick="openSubject('${s._id}')">
      <div class="subj-icon" style="background:${s.color}22;border:1px solid ${s.color}44">${s.icon}</div>
      <div class="subj-info">
        <div class="subj-name">${s.name}</div>
        <div class="subj-meta">${s.chapters.length} chapters &middot; ${s.chapters.reduce((a,c)=>a+c.lectures.length,0)} lectures</div>
      </div>
      <i class="ti ti-chevron-right subj-arrow"></i>
    </div>`).join('');
}

// ── Search ────────────────────────────────────────────────────────────────────
function handleSearch(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderSubjects(subjects); return; }
  renderSubjects(subjects.filter(s => s.name.toLowerCase().includes(q)));
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Admin Auth ────────────────────────────────────────────────────────────────
async function checkAdminAccess() {
  try {
    var config = await (await fetch('/api/config')).json();
    var ownerUsername = config.ownerUsername.toLowerCase();
    if (!ownerUsername) return;
    var tgUser = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
    var currentUsername = tgUser ? (tgUser.username || '').toLowerCase() : '';
    if (currentUsername && currentUsername === ownerUsername) {
      isAdmin = true;
      document.getElementById('adminBtn').classList.add('visible');
    }
  } catch(e) {}
}

async function apiFetch(url, method, body) {
  var opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json', 'x-tg-init-data': tg ? tg.initData : '' } };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Admin Modal ───────────────────────────────────────────────────────────────
function openAdmin(tab) {
  if (!isAdmin) return;
  document.getElementById('adminModal').classList.add('show');
  populateSelects();
  switchTab(tab || 'add-subject');
}
function closeAdmin() { document.getElementById('adminModal').classList.remove('show'); }
function closeModalOutside(e) { if (e.target.id === 'adminModal') closeAdmin(); }

function switchTab(name) {
  var tabs = ['add-subject','add-chapter','add-lecture','manage'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'manage') renderManage();
}

function populateSelects() {
  var opts = subjects.map(s => `<option value="${s._id}">${s.icon} ${s.name}</option>`).join('');
  document.getElementById('cSubject').innerHTML = opts || '<option>Pehle subject add karo</option>';
  document.getElementById('lSubject').innerHTML = opts || '<option>Pehle subject add karo</option>';
  updateLecChapters();
}

function updateLecChapters() {
  var sid = document.getElementById('lSubject').value;
  var subj = subjects.find(s => s._id === sid);
  var opts = subj ? subj.chapters.map(c => `<option value="${c._id}">${c.name}</option>`).join('') : '';
  document.getElementById('lChapter').innerHTML = opts || '<option>Pehle chapter add karo</option>';
}

function setLoading(id, loading, label) {
  var btn = document.getElementById(id);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<i class="ti ti-loader-2" style="animation:spin 0.8s linear infinite;display:inline-block"></i> Adding...' : label;
}

async function addSubject() {
  var name = document.getElementById('sName').value.trim();
  var icon = document.getElementById('sIcon').value.trim() || '📚';
  var color = document.getElementById('sColor').value;
  if (!name) return toast('Subject name daalo!', 'error');
  setLoading('btnAddSubject', true);
  try {
    await apiFetch('/api/subjects', 'POST', { name, icon, color });
    await loadSubjects(); populateSelects();
    document.getElementById('sName').value = '';
    toast('Subject add ho gaya!', 'success');
  } catch(e) { toast('Error: '+e.message, 'error'); }
  setLoading('btnAddSubject', false, '<i class="ti ti-plus"></i> Add Subject');
}

async function addChapter() {
  var sid = document.getElementById('cSubject').value;
  var name = document.getElementById('cName').value.trim();
  if (!sid || !name) return toast('Sab fields bharein!', 'error');
  setLoading('btnAddChapter', true);
  try {
    await apiFetch(`/api/subjects/${sid}/chapters`, 'POST', { name });
    await loadSubjects(); populateSelects();
    document.getElementById('cName').value = '';
    toast('Chapter add ho gaya!', 'success');
  } catch(e) { toast('Error: '+e.message, 'error'); }
  setLoading('btnAddChapter', false, '<i class="ti ti-plus"></i> Add Chapter');
}

async function addLecture() {
  var sid = document.getElementById('lSubject').value;
  var cid = document.getElementById('lChapter').value;
  var name = document.getElementById('lName').value.trim();
  var link = document.getElementById('lLink').value.trim();
  if (!sid || !cid || !name || !link) return toast('Sab fields bharein!', 'error');
  setLoading('btnAddLecture', true);
  try {
    await apiFetch(`/api/subjects/${sid}/chapters/${cid}/lectures`, 'POST', { name, link });
    await loadSubjects(); populateSelects();
    document.getElementById('lName').value = '';
    document.getElementById('lLink').value = '';
    toast('Lecture add ho gaya!', 'success');
  } catch(e) { toast('Error: '+e.message, 'error'); }
  setLoading('btnAddLecture', false, '<i class="ti ti-plus"></i> Add Lecture');
}

async function deleteSubject(id) {
  if (!confirm('Subject aur saare chapters/lectures delete honge?')) return;
  try { await apiFetch(`/api/subjects/${id}`, 'DELETE'); await loadSubjects(); renderManage(); toast('Deleted!', 'success'); }
  catch(e) { toast('Error', 'error'); }
}
async function deleteChapter(sid, cid) {
  if (!confirm('Chapter delete karna chahte ho?')) return;
  try { await apiFetch(`/api/subjects/${sid}/chapters/${cid}`, 'DELETE'); await loadSubjects(); renderManage(); toast('Deleted!', 'success'); }
  catch(e) { toast('Error', 'error'); }
}
async function deleteLecture(sid, cid, lid) {
  if (!confirm('Lecture delete karna chahte ho?')) return;
  try { await apiFetch(`/api/subjects/${sid}/chapters/${cid}/lectures/${lid}`, 'DELETE'); await loadSubjects(); renderManage(); toast('Deleted!', 'success'); }
  catch(e) { toast('Error', 'error'); }
}

function renderManage() {
  var html = '';
  subjects.forEach(s => {
    html += `<div class="manage-item"><span class="manage-item-icon">${s.icon}</span><div class="manage-item-info"><div class="manage-item-name">${s.name}</div><div class="manage-item-sub">${s.chapters.length} chapters</div></div><button class="del-btn" onclick="deleteSubject('${s._id}')"><i class="ti ti-trash"></i></button></div>`;
    s.chapters.forEach(c => {
      html += `<div class="manage-item" style="padding-left:28px"><span class="manage-item-icon" style="font-size:14px">📂</span><div class="manage-item-info"><div class="manage-item-name">${c.name}</div><div class="manage-item-sub">${s.name} · ${c.lectures.length} lec</div></div><button class="del-btn" onclick="deleteChapter('${s._id}','${c._id}')"><i class="ti ti-trash"></i></button></div>`;
      c.lectures.forEach(l => {
        html += `<div class="manage-item" style="padding-left:44px"><span class="manage-item-icon" style="font-size:13px">▶</span><div class="manage-item-info"><div class="manage-item-name">${l.name}</div><div class="manage-item-sub">${c.name}</div></div><button class="del-btn" onclick="deleteLecture('${s._id}','${c._id}','${l._id}')"><i class="ti ti-trash"></i></button></div>`;
      });
    });
  });
  document.getElementById('manageList').innerHTML = html || '<div style="text-align:center;padding:24px;color:var(--text2);font-size:13px">Kuch nahi hai</div>';
}

checkAdminAccess();
loadSubjects();
</script>
</body>
</html>
